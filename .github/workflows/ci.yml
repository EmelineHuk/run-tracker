name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm run test

      - name: Gerar build
        run: npm run build

  notify-discord:
    needs: test-and-build
    if: ${{ always() && github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Enviar alerta de sucesso
        if: ${{ needs.test-and-build.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ Commit processado com sucesso em $REPO | branch: $BRANCH | autor: $ACTOR | detalhes: $RUN_URL\"}" \
          "$DISCORD_WEBHOOK"

      - name: Enviar alerta de falha
        if: ${{ needs.test-and-build.result != 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          STATUS: ${{ needs.test-and-build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"❌ Commit com problema em $REPO | branch: $BRANCH | autor: $ACTOR | status: $STATUS | detalhes: $RUN_URL\"}" \
          "$DISCORD_WEBHOOK"